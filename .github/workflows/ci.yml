name: CI — Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # Install nmap so nmap-related tests don't skip entirely
      - name: Install system dependencies
        run: sudo apt-get install -y nmap

      - name: Install Python dependencies
        run: |
          cd backend
          pip install --upgrade pip
          # Install with --no-deps for heavy ML libs to speed up CI
          pip install -r requirements.txt
          pip install -r ../requirements-dev.txt

      - name: Lint with ruff
        run: |
          cd backend
          ruff check . --output-format=github

      - name: Type check with mypy
        run: |
          cd backend
          mypy . --ignore-missing-imports --no-error-summary || true
          # Allow mypy failures for now (type stubs not fully added);
          # change to strict once all stubs are in place.

      - name: Run unit + integration tests
        run: |
          cd backend
          pytest ../tests/ -v \
            --tb=short \
            --ignore=../backend_test.py \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=40
        env:
          # Prevent workers from trying to connect to a real MongoDB in CI
          MONGO_URL: "mongodb://localhost:99999/ci_test"
          REDIS_URL: "redis://localhost:99999/0"
          JWT_SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEFAULT_ADMIN_PASSWORD: "ci-test-admin-pass"

  frontend-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18 (for docker-compose frontend build context)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build backend Docker image
        run: docker compose build backend

      - name: Build worker Docker image
        run: docker compose build worker

      - name: Build frontend Docker image
        run: docker compose build frontend

      - name: Smoke-test backend container starts
        run: |
          # Start only backend + dependencies and verify health endpoint responds
          docker compose up -d mongodb redis backend
          sleep 15
          curl --fail --retry 5 --retry-delay 3 http://localhost:8001/api/health || \
            (docker compose logs backend && exit 1)
          docker compose down
