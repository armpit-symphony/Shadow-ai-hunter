version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: shadow_ai_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: shadow_ai_hunter
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - shadow_ai_network

  redis:
    image: redis:7-alpine
    container_name: shadow_ai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shadow_ai_network
    command: redis-server --appendonly yes

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadow_ai_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=${MONGO_URL:-mongodb://admin:changeme@mongodb:27017/shadow_ai_hunter?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    networks:
      - shadow_ai_network
    # SECURITY: Do NOT run privileged in production
    # privileged: true  # REMOVED - security risk

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shadow_ai_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
      - GENERATE_SOURCEMAP=false
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - shadow_ai_network

  nginx:
    image: nginx:alpine
    container_name: shadow_ai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - shadow_ai_network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  shadow_ai_network:
    driver: bridge