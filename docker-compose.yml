version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: shadow_ai_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: shadow_ai_hunter
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - shadow_ai_network
    # Security: MongoDB is not exposed externally in production;
    # remove the 'ports' block and use internal networking only.

  redis:
    image: redis:7-alpine
    container_name: shadow_ai_redis
    restart: unless-stopped
    # Redis is internal only; remove 'ports' in production.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shadow_ai_network
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadow_ai_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=${MONGO_URL:-mongodb://admin:changeme@mongodb:27017/shadow_ai_hunter?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-CHANGE-THIS-SECRET-IN-PRODUCTION}
      - SECRET_KEY=${SECRET_KEY:-CHANGE-THIS-SECRET-IN-PRODUCTION}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-changeme-admin}
      - DEFAULT_ANALYST_PASSWORD=${DEFAULT_ANALYST_PASSWORD:-changeme-analyst}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    networks:
      - shadow_ai_network
    # SECURITY: Do NOT run privileged in production.
    # If you need nmap scanning, use the worker service (has NET_RAW/NET_ADMIN caps).
    # privileged: true  # REMOVED — security risk

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadow_ai_worker
    restart: unless-stopped
    # Run the RQ worker listening on all defined queues
    command: >
      rq worker
      scans detection telemetry enrichment reports
      --url redis://redis:6379/0
      --log-format "%(asctime)s %(levelname)s %(message)s"
    environment:
      - MONGO_URL=${MONGO_URL:-mongodb://admin:changeme@mongodb:27017/shadow_ai_hunter?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SCAN_MAX_HOSTS=${SCAN_MAX_HOSTS:-254}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    networks:
      - shadow_ai_network
    # Network capabilities required for nmap / tcpdump scanning.
    # These are far safer than 'privileged: true'.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # No public ports — workers communicate only via Redis queue.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shadow_ai_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
      - GENERATE_SOURCEMAP=false
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - shadow_ai_network

  nginx:
    image: nginx:alpine
    container_name: shadow_ai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - shadow_ai_network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  shadow_ai_network:
    driver: bridge
