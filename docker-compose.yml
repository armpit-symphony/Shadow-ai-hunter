version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: shadow_ai_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: shadowai123
      MONGO_INITDB_DATABASE: shadow_ai_hunter
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - shadow_ai_network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadow_ai_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://admin:shadowai123@mongodb:27017/shadow_ai_hunter?authSource=admin
      - SECRET_KEY=your-super-secret-key-change-in-production
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - shadow_ai_network
    privileged: true  # Required for network scanning

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shadow_ai_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
      - GENERATE_SOURCEMAP=false
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - shadow_ai_network

  nginx:
    image: nginx:alpine
    container_name: shadow_ai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - shadow_ai_network

volumes:
  mongodb_data:
    driver: local

networks:
  shadow_ai_network:
    driver: bridge