version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: shadow_ai_mongo
    restart: unless-stopped
    # Port 27017 exposed for local dev only.
    # In production, remove 'ports' — backend connects via shadow_ai_network.
    ports:
      - "27027:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD must be set}
      MONGO_INITDB_DATABASE: shadow_ai_hunter
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - shadow_ai_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: shadow_ai_redis
    restart: unless-stopped
    # Redis internal only — no ports exposed.
    # In production, remove 'ports' entirely.
    ports:
      - "127.0.0.1:6399:6379"
    volumes:
      - redis_data:/data
    networks:
      - shadow_ai_network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadow_ai_backend
    restart: unless-stopped
    ports:
      - "8101:8001"
    environment:
      - MONGO_URL=${MONGO_URL:-mongodb://admin:password@mongodb:27017/shadow_ai_hunter?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:?DEFAULT_ADMIN_PASSWORD must be set}
      - DEFAULT_ANALYST_PASSWORD=${DEFAULT_ANALYST_PASSWORD:?DEFAULT_ANALYST_PASSWORD must be set}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - shadow_ai_network
    # NET_ADMIN/NET_RAW removed from backend — isolated scanner-worker has these.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker_scanner:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadow_ai_worker_scanner
    restart: unless-stopped
    command: >
      rq worker scans --url redis://:${REDIS_PASSWORD}@redis:6379/0
      --log-format "%(asctime)s %(levelname)s %(message)s"
    environment:
      - MONGO_URL=${MONGO_URL:-mongodb://admin:password@mongodb:27017/shadow_ai_hunter?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - SCAN_MAX_HOSTS=${SCAN_MAX_HOSTS:-254}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - shadow_ai_network
    cap_add:
      - NET_RAW
    # NET_ADMIN removed — NET_RAW is sufficient for port scanning.

  worker_detector:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadow_ai_worker_detector
    restart: unless-stopped
    command: >
      rq worker detection enrichment reports
      --url redis://:${REDIS_PASSWORD}@redis:6379/0
      --log-format "%(asctime)s %(levelname)s %(message)s"
    environment:
      - MONGO_URL=${MONGO_URL:-mongodb://admin:password@mongodb:27017/shadow_ai_hunter?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - shadow_ai_network
    # No NET_ADMIN/NET_RAW — detection/enrichment/reporting don't need packet capabilities.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shadow_ai_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://backend:8001
      - GENERATE_SOURCEMAP=false
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - shadow_ai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: shadow_ai_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - shadow_ai_network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  shadow_ai_network:
    driver: bridge
